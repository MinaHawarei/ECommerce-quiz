<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --border:#E3E1D9;
  --text:#1A1A18;
  --muted:#6B6B66;
  --hint:#A8A8A3;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --green:#3B6D11;--green-light:#EAF3DE;--green-dark:#27500A;
  --red:#A32D2D;--red-light:#FCEBEB;--red-dark:#791F1F;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --teal:#0F6E56;--teal-light:#E1F5EE;--teal-dark:#085041;
  --coral:#993C1D;--coral-light:#FAECE7;
  --pink:#993556;--pink-light:#FBEAF0;
}
html{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
body{min-height:100vh}

/* Layout */
.shell{max-width:780px;margin:0 auto;padding:2rem 1.25rem 4rem}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:12px}
.logo{font-size:13px;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-family:'DM Mono',monospace}
.header-title{font-size:22px;font-weight:600;line-height:1.2}
.header-sub{font-size:13px;color:var(--muted);margin-top:3px}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.stat .val{font-size:22px;font-weight:600;line-height:1}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em}

/* Filter */
.filter-wrap{margin-bottom:1.25rem}
.filter-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .15s}
.chip:hover{border-color:#999;color:var(--text)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* Progress */
.progress-wrap{height:3px;background:var(--border);border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
.progress-bar{height:100%;background:var(--blue);border-radius:3px;transition:width .4s ease}

/* Question card */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem}
.source-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;margin-bottom:12px;font-family:'DM Mono',monospace;letter-spacing:.01em;border:1px solid transparent}
.q-num{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.q-text{font-size:16px;font-weight:500;line-height:1.55;margin-bottom:1.25rem;color:var(--text)}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--border);border-radius:9px;padding:11px 14px;cursor:pointer;background:transparent;text-align:left;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);line-height:1.5;transition:all .15s;width:100%}
.opt:hover:not(:disabled){background:var(--bg);border-color:#BBBBBB}
.opt-letter{font-weight:600;min-width:20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px}
.opt.correct{background:var(--green-light);border-color:#97C459;color:var(--green-dark)}
.opt.correct .opt-letter{color:var(--green)}
.opt.wrong{background:var(--red-light);border-color:#F09595;color:var(--red-dark)}
.opt.wrong .opt-letter{color:var(--red)}
.opt:disabled{cursor:default}

/* Feedback */
.feedback{margin-top:1rem;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.5;display:none}
.feedback.show{display:block}
.feedback.ok{background:var(--green-light);color:var(--green-dark);border:1px solid #97C459}
.feedback.err{background:var(--red-light);color:var(--red-dark);border:1px solid #F09595}

/* Nav */
.nav-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.nav-info{font-size:13px;color:var(--muted);font-family:'DM Mono',monospace}
.btn-row{display:flex;gap:8px}
.btn{padding:9px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);font-weight:500;transition:all .15s}
.btn:hover:not(:disabled){background:var(--bg);border-color:#BBBBBB}
.btn:disabled{opacity:.35;cursor:default}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover:not(:disabled){background:#333;border-color:#333}

/* Results */
.results-hero{text-align:center;padding:2rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1.5rem}
.results-hero h2{font-size:13px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.75rem}
.score-num{font-size:56px;font-weight:600;line-height:1;margin-bottom:4px}
.score-pct{font-size:14px;color:var(--muted);margin-bottom:12px}
.grade-pill{display:inline-block;padding:5px 18px;border-radius:20px;font-size:13px;font-weight:600;letter-spacing:.02em}
.source-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin-bottom:1.5rem}
.src-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.src-row .src-name{font-size:12px;font-weight:500;color:var(--text)}
.src-row .src-score{font-size:13px;font-family:'DM Mono',monospace;font-weight:500}
.review-section h3{font-size:13px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:1rem}
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:10px}
.review-q{font-size:14px;font-weight:500;line-height:1.5;margin:8px 0 10px;color:var(--text)}
.review-ans{display:flex;flex-direction:column;gap:5px}
.ra{padding:5px 12px;border-radius:6px;font-size:12px;line-height:1.4}
.ra.wrong{background:var(--red-light);color:var(--red-dark)}
.ra.correct{background:var(--green-light);color:var(--green-dark)}
.restart-btn{display:block;margin:2rem auto 0;padding:11px 32px;border-radius:8px;border:1px solid var(--border);background:var(--text);color:var(--bg);cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500}
.restart-btn:hover{background:#333}
.no-wrong{text-align:center;padding:2rem;color:var(--muted);font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.icon{width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:3px}

.footer{text-align:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);font-size:13px;color:var(--hint);font-family:'DM Mono',monospace}
.footer span{color:#E24B4A}
@media(max-width:520px){
  .shell{padding:1rem .85rem 3rem}
  .header-title{font-size:18px}
  .q-text{font-size:15px}
  .score-num{font-size:42px}
}

});
const ALL_QUESTIONS = Array.from(fullQuestionMap.values());

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let questions=[],current=0,userAnswers=[],filterSource="All";

function init(){
  questions=shuffle(ALL_QUESTIONS);
  current=0;
  userAnswers=new Array(questions.length).fill(null);
  filterSource="All";
  render();
}

function getFiltered(){
  return filterSource==="All"?questions:questions.filter(q=>q.s===filterSource);
}

function sourceBadge(s){
  const c=SOURCE_COLORS[s]||{bg:"#F1EFE8",color:"#444441",border:"#B4B2A9"};
  return `<span class="source-badge" style="background:${c.bg};color:${c.color};border-color:${c.border}">📄 ${s}.pdf</span>`;
}

function render(){
  document.getElementById("root").innerHTML=buildQuiz();
}

function buildQuiz(){
  const filtered=getFiltered();
  if(!filtered.length)return`<p style="color:#6B6B66;padding:2rem 0">No questions for this filter.</p>`;
  const idx=Math.min(current,filtered.length-1);
  const q=filtered[idx];
  const gi=questions.indexOf(q);
  const ua=userAnswers[gi];
  const answeredCount=userAnswers.filter(x=>x!==null).length;
  const correctCount=userAnswers.reduce((a,u,i)=>u===null?a:a+(u===questions[i].a?1:0),0);
  const pct=Math.round((idx+1)/filtered.length*100);

  const sources=["All",...new Set(questions.map(q=>q.s))];
  const chips=sources.map(k=>{
    const cnt=k==="All"?questions.length:questions.filter(x=>x.s===k).length;
    return `<button class="chip${filterSource===k?" active":""}" onclick="setFilter('${k.replace(/'/g, "\\'")}')">${k==="All"?"All":k} (${cnt})</button>`;
  }).join("");

  const opts=q.o.map((o,i)=>{
    let cls="opt";
    if(ua!==null){
      if(i===q.a)cls+=" correct";
      else if(i===ua&&ua!==q.a)cls+=" wrong";
    }
    return `<button class="${cls}"${ua!==null?" disabled":""} onclick="answer(${gi},${i})"><span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`;
  }).join("");

  let fb="";
  if(ua!==null){
    fb=ua===q.a
      ?`<div class="feedback ok show">✓ Correct!</div>`
      :`<div class="feedback err show">✗ Incorrect. Correct answer: <strong>${String.fromCharCode(65+q.a)}. ${q.o[q.a]}</strong></div>`;
  }

  const isLast=idx===filtered.length-1;
  const nextBtn=isLast&&answeredCount>0
    ?`<button class="btn btn-primary" onclick="showResults()">See Results →</button>`
    :`<button class="btn" onclick="next()" ${ua===null?"disabled":""}>Next →</button>`;

  return`
<div class="stats-row">
  <div class="stat"><div class="val">${filtered.length}</div><div class="lbl">Total</div></div>
  <div class="stat"><div class="val" style="color:#185FA5">${answeredCount}</div><div class="lbl">Answered</div></div>
  <div class="stat"><div class="val" style="color:#3B6D11">${correctCount}</div><div class="lbl">Correct</div></div>
  <div class="stat"><div class="val" style="color:#A32D2D">${answeredCount-correctCount}</div><div class="lbl">Wrong</div></div>
</div>
<div class="filter-wrap">
  <div class="filter-label">Filter by source file</div>
  <div class="filter-chips">${chips}</div>
</div>
<div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
<div class="q-card">
  ${sourceBadge(q.s)}
  <div class="q-num">Question ${idx+1} of ${filtered.length}</div>
  <div class="q-text">${q.q}</div>
  <div class="options">${opts}</div>
  ${fb}
  <div class="nav-row" style="margin-top:1.25rem">
    <span class="nav-info">${idx+1} / ${filtered.length}</span>
    <div class="btn-row">
      <button class="btn" onclick="prev()" ${idx===0?"disabled":""}>← Prev</button>
      ${nextBtn}
    </div>
  </div>
</div>`;
}

function answer(gi,i){
  if(userAnswers[gi]!==null)return;
  userAnswers[gi]=i;
  render();
}
function next(){const f=getFiltered();if(current<f.length-1){current++;render();}}
function prev(){if(current>0){current--;render();}}
function setFilter(s){filterSource=s;current=0;render();}

function showResults(){
  const total=questions.length;
  const answeredCount=userAnswers.filter(x=>x!==null).length;
  const correctCount=userAnswers.reduce((a,u,i)=>u===null?a:a+(u===questions[i].a?1:0),0);
  const pct=answeredCount>0?Math.round(correctCount/answeredCount*100):0;

  let grade,gColor,gBg;
  if(pct>=90){grade="Excellent";gColor="#27500A";gBg="#EAF3DE";}
  else if(pct>=75){grade="Good";gColor="#0C447C";gBg="#E6F1FB";}
  else if(pct>=60){grade="Pass";gColor="#633806";gBg="#FAEEDA";}
  else{grade="Needs Review";gColor="#501313";gBg="#FCEBEB";}

  const sourcesSet=[...new Set(questions.map(q=>q.s))];
  const bySource=sourcesSet.map(s=>{
    const sq=questions.filter(q=>q.s===s);
    const sc=sq.filter(q=>userAnswers[questions.indexOf(q)]===q.a).length;
    const sa=sq.filter(q=>userAnswers[questions.indexOf(q)]!==null).length;
    const c=SOURCE_COLORS[s]||{bg:"#F1EFE8",color:"#444441",border:"#B4B2A9"};
    return`<div class="src-row"><span class="source-badge" style="background:${c.bg};color:${c.color};border-color:${c.border};margin-bottom:0">📄 ${s}</span><span class="src-score">${sc}/${sa>0?sa:sq.length}</span></div>`;
  }).join("");

  const wrongItems=questions.map((q,i)=>{
    const ua=userAnswers[i];
    if(ua===null||ua===q.a)return"";
    return`<div class="review-card">
      ${sourceBadge(q.s)}
      <div class="review-q">${q.q}</div>
      <div class="review-ans">
        <div class="ra wrong">✗ Your answer: ${String.fromCharCode(65+ua)}. ${q.o[ua]}</div>
        <div class="ra correct">✓ Correct: ${String.fromCharCode(65+q.a)}. ${q.o[q.a]}</div>
      </div>
    </div>`;
  }).join("");

  const wrongCount=questions.filter((q,i)=>userAnswers[i]!==null&&userAnswers[i]!==q.a).length;

  document.getElementById("root").innerHTML=`
<div class="results-hero">
  <h2>Quiz Complete</h2>
  <div class="score-num">${correctCount} <span style="font-size:28px;color:#6B6B66">/ ${answeredCount}</span></div>
  <div class="score-pct">${pct}% correct · ${total-answeredCount} skipped</div>
  <span class="grade-pill" style="background:${gBg};color:${gColor}">${grade}</span>
</div>
<div class="source-summary">${bySource}</div>
<div class="review-section">
  <h3>Wrong answers to review (${wrongCount})</h3>
  ${wrongItems||`<div class="no-wrong">🎉 No wrong answers — perfect score on answered questions!</div>`}
</div>
<button class="restart-btn" onclick="init()">↺ Restart Quiz</button>`;
}

window.answer=answer;window.next=next;window.prev=prev;
window.setFilter=setFilter;window.showResults=showResults;window.init=init;

init();
</script>
</body>
</html>
